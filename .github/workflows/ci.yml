name: CI Pipeline

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '17'
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================
  # Consumer Service Tests (Python)
  # ============================================
  test-consumer:
    name: Consumer Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: consumer-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('consumer-service/requirements*.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: consumer-service/coverage.xml
          flags: consumer-unit
          name: consumer-coverage
        continue-on-error: true

  # ============================================
  # Producer Service Tests (Java)
  # ============================================
  test-producer:
    name: Producer Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integration-producer

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('integration-producer/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Run tests
        run: mvn test -B -q

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: producer-test-results
          path: integration-producer/target/surefire-reports/
          retention-days: 7

  # ============================================
  # Analytics Service Tests (Java)
  # ============================================
  test-analytics:
    name: Analytics Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analytic-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('analytic-service/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Run tests
        run: mvn test -B -q

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analytics-test-results
          path: analytic-service/target/surefire-reports/
          retention-days: 7

  # ============================================
  # Build Verification (after all tests pass)
  # ============================================
  build:
    name: Build Services
    runs-on: ubuntu-latest
    needs: [test-consumer, test-producer, test-analytics]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-build
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Build Producer
        run: mvn package -DskipTests -B -q
        working-directory: integration-producer

      - name: Build Analytics
        run: mvn package -DskipTests -B -q
        working-directory: analytic-service

      - name: Build Mock Service
        run: mvn package -DskipTests -B -q
        working-directory: mock-service

      - name: Build Docker images (verify Dockerfiles)
        run: |
          docker build -t integration-producer:test ./integration-producer
          docker build -t integration-consumer:test ./consumer-service
          docker build -t integration-analytics:test ./analytic-service
          docker build -t integration-mock:test ./mock-service

  # ============================================
  # Summary Job
  # ============================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [build]
    if: success()

    steps:
      - name: CI Pipeline Passed
        run: echo "All tests passed and builds succeeded!"
